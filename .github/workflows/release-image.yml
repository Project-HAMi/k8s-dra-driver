name: "Release Image"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (例如: v1.0.0, latest, dev)'
        required: true
        default: 'latest'
        type: string

jobs:
  image:
    env:
      IMAGE_NAME: ${{ 'projecthami/k8s-dra-driver' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        image: tonistiigi/binfmt:qemu-v7.0.0-28

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker Login
      uses: docker/login-action@v3.1.0
      with:
        username: ${{ secrets.DOCKERHUB_TOKEN }}
        password: ${{ secrets.DOCKERHUB_PASSWD }}

    - name: Prepare build arguments
      id: args
      shell: bash
      run: |
        version="${{ github.event.inputs.tag }}"
        {
          echo "version=${version}"
          echo "golang_version=$(make print-GOLANG_VERSION)"
          echo "bash_static_git_ref=$(make print-BASH_STATIC_GIT_REF)"
          echo "toolkit_container_image=$(make print-TOOLKIT_CONTAINER_IMAGE)"
          echo "hami_core_build_image=$(make print-HAMI_CORE_BUILD_IMAGE)"
          echo "git_commit=$(make print-GIT_COMMIT)"
        } >> "${GITHUB_OUTPUT}"

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: deploy/container/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        provenance: false
        sbom: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          GOLANG_VERSION=${{ steps.args.outputs.golang_version }}
          BASH_STATIC_GIT_REF=${{ steps.args.outputs.bash_static_git_ref }}
          TOOLKIT_CONTAINER_IMAGE=${{ steps.args.outputs.toolkit_container_image }}
          HAMI_CORE_BUILD_IMAGE=${{ steps.args.outputs.hami_core_build_image }}
          VERSION=${{ steps.prep.outputs.version }}
          GIT_COMMIT=${{ steps.args.outputs.git_commit }}
        tags: ${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}
