name: "CI"

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths-ignore:
      - 'README.md'
      - 'demo/**'
      - 'imgs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'demo/**'
      - 'imgs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.1'

    - name: Build
      run: make build

    - name: Test
      run: make test

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.6

  image:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Compute image metadata
      id: image
      shell: bash
      run: |
        owner="${GITHUB_REPOSITORY_OWNER,,}"
        short_sha="$(git rev-parse --short=8 HEAD)"
        version="$(make print-VERSION)"
        tags="sha-${short_sha}"

        if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
          tags="main ${tags}"
        fi

        if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
          version="${GITHUB_REF_NAME}"
          tags="${GITHUB_REF_NAME} latest sha-${short_sha}"
        fi

        {
          echo "image_name=ghcr.io/${owner}/k8s-dra-driver"
          echo "version=${version}"
          echo "tags=${tags}"
        } >> "${GITHUB_OUTPUT}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build image
      env:
        IMAGE_NAME: ${{ steps.image.outputs.image_name }}
        IMAGE_TAGS: ${{ steps.image.outputs.tags }}
        VERSION: ${{ steps.image.outputs.version }}
        BUILD_MULTI_ARCH_IMAGES: 'true'
        PLATFORMS: linux/amd64
        PUSH_ON_BUILD: ${{ github.event_name == 'push' && 'true' || 'false' }}
      run: make -f deploy/container/Makefile build
