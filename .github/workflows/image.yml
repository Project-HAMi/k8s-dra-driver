name: "Image"

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - '.github/workflows/image.yml'
      - 'api/**'
      - 'common.mk'
      - 'deploy/container/**'
      - 'cmd/**'
      - 'pkg/**'
      - 'internal/**'
      - 'lib/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'versions.mk'
      - 'hack/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Prepare image name
      id: prep
      shell: bash
      run: |
        version="$(make print-VERSION)"
        if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
          version="${GITHUB_REF_NAME}"
        fi

        {
          echo "image_name=ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "version=${version}"
        } >> "${GITHUB_OUTPUT}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.prep.outputs.image_name }}
        tags: |
          type=raw,value=main,enable={{is_default_branch}}
          type=ref,event=tag
          type=sha,format=short,prefix=sha-
          type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Load build arguments
      id: args
      shell: bash
      run: |
        {
          echo "golang_version=$(make print-GOLANG_VERSION)"
          echo "bash_static_git_ref=$(make print-BASH_STATIC_GIT_REF)"
          echo "toolkit_container_image=$(make print-TOOLKIT_CONTAINER_IMAGE)"
          echo "hami_core_build_image=$(make print-HAMI_CORE_BUILD_IMAGE)"
          echo "git_commit=$(make print-GIT_COMMIT)"
        } >> "${GITHUB_OUTPUT}"

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: deploy/container/Dockerfile
        platforms: linux/amd64
        push: true
        provenance: false
        sbom: false
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          GOLANG_VERSION=${{ steps.args.outputs.golang_version }}
          BASH_STATIC_GIT_REF=${{ steps.args.outputs.bash_static_git_ref }}
          TOOLKIT_CONTAINER_IMAGE=${{ steps.args.outputs.toolkit_container_image }}
          HAMI_CORE_BUILD_IMAGE=${{ steps.args.outputs.hami_core_build_image }}
          VERSION=${{ steps.prep.outputs.version }}
          GIT_COMMIT=${{ steps.args.outputs.git_commit }}
