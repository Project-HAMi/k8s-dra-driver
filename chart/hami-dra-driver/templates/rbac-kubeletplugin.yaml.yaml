{{- if .Values.serviceAccount.create -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "hami-dra-driver.name" . }}-clusterrole-kubeletplugin
  labels:
    {{- include "hami-dra-driver.labels" . | nindent 4 }}
rules:
- apiGroups: 
  - resource.k8s.io
  resources:
  - resourceclaims
  verbs: 
  - get
  - list
  - watch
- apiGroups:
  - resource.k8s.io
  resources:
  - resourceclaimtemplates
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - delete
- apiGroups:
  - resource.k8s.io
  resources:
  - resourceslices
  verbs: 
  - get
  - list
  - watch
  - create
  - update
  - delete
- apiGroups:
  - resource.k8s.io
  resources:
  - resourceclaims/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - resource.k8s.io
  resources:
  - resourceclaims/driver
  verbs:
  - associated-node:update
  - associated-node:patch
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
  - update
- apiGroups:
  - ""
  resources: 
  - pods
  verbs:
  - get
  - list
  - watch
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "hami-dra-driver.serviceAccountName" . }}-kubeletplugin
  namespace: {{ include "hami-dra-driver.namespace" . }}
  labels:
    {{- include "hami-dra-driver.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "hami-dra-driver.name" . }}-clusterrole-binding-kubeletplugin
  labels:
    {{- include "hami-dra-driver.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "hami-dra-driver.serviceAccountName" $ }}-kubeletplugin
  namespace: {{ include "hami-dra-driver.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "hami-dra-driver.name" . }}-clusterrole-kubeletplugin
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "hami-dra-driver.name" . }}-role-kubeletplugin
  namespace: {{ include "hami-dra-driver.namespace" . }}
  labels:
    {{- include "hami-dra-driver.labels" . | nindent 4 }}
{{- if (and .Values.resources.gpus.enabled .Values.featureGates.MPSSupport) }}
rules:
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hami-dra-driver.name" . }}-role-binding-kubeletplugin
  namespace: {{ include "hami-dra-driver.namespace" . }}
  labels:
    {{- include "hami-dra-driver.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "hami-dra-driver.serviceAccountName" . }}-kubeletplugin
  namespace: {{ include "hami-dra-driver.namespace" . }}
roleRef:
  kind: Role
  name: {{ include "hami-dra-driver.name" . }}-role-kubeletplugin
  apiGroup: rbac.authorization.k8s.io
