apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  name: hami-core-gpu.projet-hami.io
  labels:
    helm.sh/chart: hami-dra-driver-0.1.0
    app.kubernetes.io/version: "v0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hami-dra-driver
    app.kubernetes.io/instance: hami-dra-driver
spec:
  selectors:
  - cel:
      expression: "device.driver == 'hami-core-gpu.project-hami.io' && device.attributes['hami-core-gpu.project-hami.io'].type == 'hami-gpu')"
  extendedResourceName: nvidia.com/gpu
